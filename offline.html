<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildBoss PRO — Offline</title>
<style>
  :root {
    --bg: #1a1c22;
    --surface: #22252e;
    --border: #2a2d35;
    --gold: #f7c53b;
    --text: #e8eaf0;
    --text2: #9aa0b0;
    --text3: #5a6070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
    padding: 40px 32px;
    max-width: 360px;
  }

  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 24px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%       { opacity: 0.9; transform: scale(1.06); }
  }

  .logo {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 4px;
    letter-spacing: -.5px;
  }
  .logo .b { color: #e8eaf0; }
  .logo .g { color: var(--gold); }
  .logo-sub {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  h2 {
    font-size: 15px;
    font-weight: 400;
    color: var(--text2);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text3);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .info-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: left;
    margin-bottom: 28px;
  }

  .info-box p {
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
  }

  .info-box span {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold);
    color: #1a1c22;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: filter 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(.96); }

  .version {
    margin-top: 28px;
    font-size: 11px;
    color: var(--text3);
  }
</style>
</head>
<body>
<div class="container">

  <svg class="icon" viewBox="0 0 72 72" fill="none">
    <rect width="72" height="72" rx="18" fill="#22252e"/>
    <rect x="8" y="8" width="56" height="56" rx="14" fill="#f7c53b" opacity=".08"/>
    <text x="36" y="46" text-anchor="middle" font-size="32" font-family="Arial">🏗️</text>
  </svg>

  <div class="logo">
    <span class="b">Build</span><span class="g">Boss</span>
  </div>
  <div class="logo-sub">PRO</div>

  <h2>You're offline right now.<br>Your data is safe on this device.</h2>

  <div class="badge">
    <div class="dot"></div>
    No internet connection
  </div>

  <div class="info-box">
    <p>💡 Good to know</p>
    <span>All your audits, talks, briefings and incident reports are stored locally on your device and fully available offline.</span>
  </div>

  <button class="btn" onclick="window.location.href='/buildboss-pro/'">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
    Open App
  </button>

  <p class="version">BuildBoss PRO v2.0.0 — Works offline</p>
</div>
</body>
</html>
